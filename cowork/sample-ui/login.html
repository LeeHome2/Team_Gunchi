<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 건축물 배치 시스템</title>
<link rel="stylesheet" href="common.css">
<style>
  body{background:#111318;min-height:100vh;display:flex;flex-direction:column}
  .login-topbar{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06)}
  .login-topbar .topbar-logo{color:#fff}
  .login-topbar .topbar-badge{background:rgba(255,255,255,.08);color:rgba(255,255,255,.45)}
  .login-body{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .login-card{width:400px;background:#fff;border-radius:var(--radius-xl);padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .tab-switch{display:flex;border-bottom:1.5px solid var(--gray-200);margin-bottom:24px}
  .tab-switch .tab{flex:1;text-align:center;padding:12px;font-size:13.5px;font-weight:500;color:var(--gray-400);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all var(--transition)}
  .tab-switch .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
  .signup-fields{display:none}
  .recover-fields{display:none}
  .recover-back{font-size:12.5px;color:var(--primary);cursor:pointer;font-weight:500;display:inline-block;margin-bottom:14px}
  .recover-back:hover{text-decoration:underline}
  .form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .form-check{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--gray-500);cursor:pointer}
  .form-check input{width:14px;height:14px;accent-color:var(--primary)}
  .form-link{font-size:12.5px;color:var(--primary);cursor:pointer;font-weight:500}
  .form-link:hover{text-decoration:underline}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--gray-400);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200)}
  .social-btn{width:100%;height:42px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:#fff;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--gray-700);cursor:pointer;font-weight:500;font-family:inherit;transition:all var(--transition)}
  .social-btn:hover{background:var(--gray-50);border-color:var(--gray-300)}
  .social-btn svg{width:16px;height:16px}
  .login-footer{text-align:center;margin-top:14px;font-size:12px;color:var(--gray-400)}
  .admin-link{text-align:center;margin-top:16px}
  .admin-link a{font-size:11.5px;color:rgba(255,255,255,.3);transition:color var(--transition)}
  .admin-link a:hover{color:rgba(255,255,255,.55)}
</style>
</head>
<body>
  <div class="topbar login-topbar">
    <div class="topbar-logo">건축물 배치 시스템</div>
    <span class="topbar-badge">Cesium 3D</span>
  </div>

  <div class="login-body">
    <div>
      <div class="login-card">
        <div class="tab-switch" id="tabs">
          <div class="tab active" onclick="switchTab('login')">로그인</div>
          <div class="tab" onclick="switchTab('signup')">회원가입</div>
        </div>

        <div id="login-form">
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input class="input" type="email" placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input class="input" type="password" placeholder="비밀번호를 입력하세요">
          </div>
          <div class="form-row">
            <label class="form-check"><input type="checkbox"> 로그인 유지</label>
            <span class="form-link" onclick="switchTab('recover')">비밀번호 찾기</span>
          </div>
          <button class="btn btn-primary btn-block" style="padding:11px;font-size:14px" onclick="location.href='projects.html'">로그인</button>
          <div class="divider">또는</div>
          <button class="social-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google로 계속하기
          </button>
        </div>

        <div id="signup-form" class="signup-fields">
          <div class="form-group">
            <label class="form-label">이름</label>
            <input class="input" type="text" placeholder="이름을 입력하세요">
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input class="input" type="email" placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input class="input" type="password" placeholder="8자 이상">
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호 확인</label>
            <input class="input" type="password" placeholder="비밀번호 재입력">
          </div>
          <button class="btn btn-primary btn-block" style="padding:11px;font-size:14px;margin-top:4px" onclick="switchTab('login');showToast('회원가입이 완료되었습니다')">회원가입</button>
        </div>
        <div id="recover-form" class="recover-fields">
          <span class="recover-back" onclick="switchTab('login')">← 로그인으로 돌아가기</span>
          <div style="font-size:15px;font-weight:600;margin-bottom:4px">아이디 / 비밀번호 찾기</div>
          <div style="font-size:12.5px;color:var(--gray-500);margin-bottom:18px;line-height:1.5">가입 시 사용한 이메일을 입력하면 비밀번호 재설정 링크를 보내드립니다.</div>
          <div class="form-group">
            <label class="form-label">가입 이메일</label>
            <input class="input" type="email" placeholder="example@email.com">
          </div>
          <button class="btn btn-primary btn-block" style="padding:11px;font-size:14px" onclick="showToast('비밀번호 재설정 링크가 발송되었습니다')">재설정 링크 발송</button>
        </div>
        <div class="login-footer">계속 진행 시 이용약관에 동의하는 것으로 간주합니다.</div>
      </div>
      <div class="admin-link"><a href="admin-login.html">관리자 로그인 →</a></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script>
    function switchTab(tab){
      const tabs=document.querySelectorAll('.tab-switch .tab');
      tabs.forEach(t=>t.classList.remove('active'));
      document.getElementById('login-form').style.display='none';
      document.getElementById('signup-form').style.display='none';
      document.getElementById('recover-form').style.display='none';
      document.querySelector('.tab-switch').style.display='flex';
      document.querySelector('.login-footer').style.display='block';
      if(tab==='login'){tabs[0].classList.add('active');document.getElementById('login-form').style.display='block'}
      else if(tab==='signup'){tabs[1].classList.add('active');document.getElementById('signup-form').style.display='block'}
      else if(tab==='recover'){document.querySelector('.tab-switch').style.display='none';document.querySelector('.login-footer').style.display='none';document.getElementById('recover-form').style.display='block'}
    }
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
  </script>
</body>
</html>
